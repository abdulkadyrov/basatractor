<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#050509" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="PWA для учета клиентов, заказов, расходов, прибыли и отчетов для услуг мини-трактора."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Basa Tractor CRM</title>
  </head>
  <body>
    <div class="app-shell">
      <div class="ambient-backdrop" aria-hidden="true">
        <div class="ambient ambient-blue"></div>
        <div class="ambient ambient-green"></div>
        <div class="ambient ambient-amber"></div>
        <div class="grid-overlay"></div>
      </div>

      <header class="topbar glass-panel">
        <div class="brand-block">
          <div class="brand-mark">BT</div>
          <div class="brand-copy">
            <p class="eyebrow">PWA Управление</p>
            <h1>Basa Tractor CRM</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="headerCalculatorButton" class="icon-button" type="button" aria-label="Открыть калькулятор">
            <span>⌘</span>
          </button>
          <button id="themeToggleButton" class="icon-button" type="button" aria-label="Сменить тему">
            <span>◐</span>
          </button>
        </div>
      </header>

      <main id="appContent" class="app-content" aria-live="polite"></main>

      <button id="quickAddButton" class="quick-add-button" type="button" aria-label="Быстрое добавление">
        <span>+</span>
      </button>

      <nav class="bottom-nav glass-panel" aria-label="Основная навигация">
        <button class="nav-item is-active" data-screen="home" type="button">
          <span>Главная</span>
        </button>
        <button class="nav-item" data-screen="orders" type="button">
          <span>Заказы</span>
        </button>
        <button class="nav-item" data-screen="clients" type="button">
          <span>Клиенты</span>
        </button>
        <button class="nav-item" data-screen="reports" type="button">
          <span>Отчеты</span>
        </button>
        <button class="nav-item" data-screen="settings" type="button">
          <span>Настройки</span>
        </button>
      </nav>
    </div>

    <div id="sheetRoot" class="sheet-root" aria-live="polite"></div>
    <div id="toastRoot" class="toast-root" aria-live="assertive" aria-atomic="true"></div>

    <template id="sheetTemplate">
      <section class="sheet-backdrop" role="presentation">
        <div class="sheet-panel glass-panel" role="dialog" aria-modal="true">
          <div class="sheet-handle" aria-hidden="true"></div>
          <div class="sheet-header">
            <div>
              <p class="sheet-kicker"></p>
              <h2 class="sheet-title"></h2>
            </div>
            <button class="icon-button sheet-close" type="button" aria-label="Закрыть">
              <span>✕</span>
            </button>
          </div>
          <div class="sheet-body"></div>
        </div>
      </section>
    </template>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
